name: Daily Quote

on:
  workflow_dispatch:
  schedule:
    # Runs at 2:30am UTC - 8qm IST
    - cron: "30 2 * * *"

jobs:
  update-readme:
    name: Run node here
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-node@v2
        with:
          node-version: "16.x"
      - run: npm install
      - run: npm start
      - env:
          EMAIL: ${{ secrets.EMAIL }}
          PASSWORD: ${{ secrets.PASSWORD }}
          WEBHOOK: ${{ secrets.WEBHOOK }}
